# ============================================================================
# Build and publish the `lifton` distribution to (Test)PyPI.
#
# OIDC TRUSTED PUBLISHING (no stored API tokens)
# --------------------------------------------------------------------------
# This workflow uses GitHub's OIDC trusted-publisher flow, so NO PyPI/TestPyPI
# API token is ever stored as a repo secret. Instead each publish job mints a
# short-lived OIDC token (permissions: id-token: write) that the pypa publish
# action exchanges with (Test)PyPI for an upload credential.
#
# ONE-TIME MAINTAINER SETUP (must be done on the PyPI / TestPyPI side before
# the first publish — see the report / README for the click-path):
#   * On https://pypi.org      -> project `lifton` -> Publishing -> add a
#     "GitHub" trusted publisher:
#         Owner        = <this repo's owner/org>
#         Repository   = LiftOn
#         Workflow     = publish.yml
#         Environment  = pypi
#   * On https://test.pypi.org -> same, but Environment = testpypi
#   * In this repo's Settings -> Environments, create two environments named
#     `pypi` and `testpypi` (optionally add required reviewers / branch rules).
# The PyPI project name is `lifton` (setup.py: name="lifton").
#
# RELEASE GATING
# --------------------------------------------------------------------------
# The `build` job intentionally `needs:` nothing heavier than a quick build —
# it does NOT re-run the test suite. The repo's tests.yml (which runs the FULL
# pytest suite INCLUDING the load-bearing 24-cell byte-identity matrix,
# tests/test_native_matrix.py) is the gating test suite. Only cut a GitHub
# Release from a commit whose tests.yml run is green.
#
# BUILD NOTE
# --------------------------------------------------------------------------
# pyproject.toml pins setuptools<81 in [build-system].requires on purpose:
# `cigar` 0.1.3's sdist imports pkg_resources, which setuptools 81 removed.
# `python -m build` honours that pin via PEP 517 build isolation, so no extra
# pin is needed here.
# ============================================================================
name: Publish to PyPI

on:
  # A published GitHub Release drives the real-PyPI publish.
  release:
    types: [published]
  # Manual trigger is the dry-run path: it publishes to TestPyPI only.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: setup.py
    - name: Install build tooling
      run: python -m pip install --upgrade pip build twine
    - name: Build sdist + wheel
      # PEP 517 build in an isolated env that honours pyproject.toml's
      # setuptools>=61,<81 pin (required for the cigar build dep).
      run: python -m build
    - name: Check metadata with twine
      run: twine check dist/*
    - name: Smoke-test the built wheel in a clean venv
      # Install ONLY the freshly built wheel (not the source tree) so we verify
      # the actual artifact users will get. The lifton CLI's heavy native deps
      # (parasail/pysam/...) are pulled in by the wheel's install_requires.
      run: |
        python -m venv /tmp/lifton-smoke
        /tmp/lifton-smoke/bin/python -m pip install --upgrade pip
        /tmp/lifton-smoke/bin/python -m pip install dist/*.whl
        /tmp/lifton-smoke/bin/lifton -h
        /tmp/lifton-smoke/bin/lifton -V
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/*
        if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI (dry-run path)
    needs: build
    # Only the manual dispatch publishes to TestPyPI — a real Release goes
    # straight to production PyPI via publish-pypi below.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testpypi
    permissions:
      # Mint the short-lived OIDC token the publish action exchanges with
      # TestPyPI. No stored token.
      id-token: write
    steps:
    - name: Download dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist
    - name: Publish to TestPyPI (OIDC trusted publishing)
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    # Production publish fires ONLY on a published GitHub Release.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      # Mint the short-lived OIDC token the publish action exchanges with PyPI.
      # No stored token.
      id-token: write
    steps:
    - name: Download dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist
    - name: Publish to PyPI (OIDC trusted publishing)
      uses: pypa/gh-action-pypi-publish@release/v1
